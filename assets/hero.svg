<!-- ===================================================== -->
<!-- assets/hero.svg -->
<!-- ZERO-CONTACT -->
<!-- PART 1 / FOUNDATION -->
<!-- ===================================================== -->

<svg
xmlns="http://www.w3.org/2000/svg"
width="1600"
height="620"
viewBox="0 0 1600 620"
fill="none">

<defs>

<!-- ========================= -->
<!-- COLORS -->
<!-- ========================= -->

<linearGradient
id="accent"
x1="0"
y1="0"
x2="1600"
y2="620">

<stop offset="0%" stop-color="#39BDF8"/>
<stop offset="100%" stop-color="#58D2FF"/>

</linearGradient>

<!-- ========================= -->
<!-- SHADOW -->
<!-- ========================= -->

<filter
id="shadow"
x="-50%"
y="-50%"
width="200%"
height="200%">

<feDropShadow
dx="0"
dy="20"
stdDeviation="30"
flood-color="#000000"
flood-opacity=".35"/>

</filter>

<!-- ========================= -->
<!-- GRID -->
<!-- ========================= -->

<pattern
id="gridSmall"
width="40"
height="40"
patternUnits="userSpaceOnUse">

<path

d="M40 0H0V40"

stroke="#FFFFFF"

stroke-opacity=".015"

stroke-width="1"/>

</pattern>

<pattern
id="gridLarge"
width="200"
height="200"
patternUnits="userSpaceOnUse">

<rect
width="200"
height="200"
fill="url(#gridSmall)"/>

<path

d="M200 0H0V200"

stroke="#39BDF8"

stroke-opacity=".03"

stroke-width="1"/>

</pattern>

</defs>

<!-- ===================================================== -->
<!-- BACKGROUND -->
<!-- ===================================================== -->

<rect

width="1600"

height="620"

rx="32"

fill="#090B10"/>

<rect

width="1600"

height="620"

fill="url(#gridLarge)"/>

<!-- ===================================================== -->
<!-- MAIN PANEL -->
<!-- ===================================================== -->

<rect

x="40"

y="40"

width="1520"

height="540"

rx="28"

fill="#111827"

fill-opacity=".42"

stroke="#222C39"

filter="url(#shadow)"/>

<!-- ===================================================== -->
<!-- SAFE AREA -->
<!-- ===================================================== -->

<rect

x="90"

y="90"

width="1420"

height="440"

rx="20"

fill="none"

stroke="#FFFFFF"

stroke-opacity=".025"/>

<!-- ===================================================== -->
<!-- HEADER -->
<!-- ===================================================== -->

<text

x="800"

y="95"

text-anchor="middle"

fill="#F8FAFC"

font-size="15"

font-family="JetBrains Mono"

letter-spacing="4">

ZERO-CONTACT

</text>

<!-- ===================================================== -->
<!-- AVATAR -->
<!-- ===================================================== -->

<defs>

<clipPath id="avatarClip">

<circle
cx="800"
cy="215"
r="95"/>

</clipPath>

</defs>

<!--
Replace href with your avatar path if needed.
-->

<image

href="href="href="https://raw.githubusercontent.com/Zero-Contact/Zero-Contact/main/assets/avatar.png""

x="705"

y="120"

width="190"

height="190"

clip-path="url(#avatarClip)"

preserveAspectRatio="xMidYMid slice"/>

<!-- Avatar Ring -->

<circle

cx="800"

cy="215"

r="95"

fill="none"

stroke="#FFFFFF"

stroke-opacity=".05"

stroke-width="2"/>

<circle

cx="800"

cy="215"

r="104"

fill="none"

stroke="url(#accent)"

stroke-opacity=".20"

stroke-width="2"/>

<!-- ===================================================== -->
<!-- TITLE -->
<!-- ===================================================== -->

<text

x="800"

y="370"

text-anchor="middle"

fill="#F8FAFC"

font-size="56"

font-family="IBM Plex Sans"

font-weight="700">

ZERO-CONTACT

</text>

